<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="dashboard">
      <header>
        <h1>Weather Dashboard</h1>
        <p>Forecast from the Open-Meteo API</p>
      </header>

      <section class="controls">
        <div class="location-inputs">
          <label>
            Latitude
            <input id="latitude" type="number" step="0.0001" value="35.4676" />
          </label>
          <label>
            Longitude
            <input id="longitude" type="number" step="0.0001" value="-97.5164" />
          </label>
        </div>
        <div class="actions">
          <button id="currentLocationBtn">Use my location</button>
          <button id="fetchWeatherBtn">Fetch Forecast</button>
        </div>
      </section>

      <section id="status" class="status">Enter coordinates or use your location to get a forecast.</section>

      <section class="weather-grid">
        <article class="current-weather card">
          <h2>Now</h2>
          <div class="current-value" id="currentTemp">--</div>
          <div class="current-details">
            <div><strong>Wind:</strong> <span id="currentWind">--</span></div>
            <div><strong>Condition:</strong> <span id="currentCondition">--</span></div>
          </div>
        </article>

        <article class="forecast-summary card">
          <h2>Daily Forecast</h2>
          <div class="summary-row"><strong>High:</strong> <span id="highTemp">--</span></div>
          <div class="summary-row"><strong>Low:</strong> <span id="lowTemp">--</span></div>
          <div class="summary-row"><strong>Rain chance:</strong> <span id="rainChance">--</span></div>
        </article>
      </section>

      <section class="forecast-list card">
        <h2>Next Days</h2>
        <div id="forecastCards" class="forecast-cards"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
